spring:
  application:
    name: backend-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/image_preprocess}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-google-client-secret}
            scope:
              - email
              - profile

server:
  port: 8080

app:
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/oauth2/success}
  jwt:
    secret: ${JWT_SECRET:change-this-local-development-secret-at-least-32-bytes}
    access-token-expire-seconds: ${ACCESS_TOKEN_EXPIRE_SECONDS:1800}
    refresh-token-expire-seconds: ${REFRESH_TOKEN_EXPIRE_SECONDS:1209600}
  auth:
    refresh-cookie:
      name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  worker:
    internal-token: ${WORKER_INTERNAL_TOKEN:local-worker-token}

storage:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:image-preprocess-local}
  region: ${MINIO_REGION:us-east-1}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  health:
    rabbit:
      enabled: ${RABBIT_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
