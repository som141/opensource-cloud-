apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: docprep-cloud
  annotations:
    docprep-cloud.io/placeholder: "Replace with OpenTelemetry Collector deployment or disable trace sampling."
spec:
  type: ExternalName
  externalName: otel-collector.example.internal
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
