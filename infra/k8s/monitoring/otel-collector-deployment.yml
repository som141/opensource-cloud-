apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: docprep-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: docprep-cloud
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:0.128.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otel-collector-config.yml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          readinessProbe:
            tcpSocket:
              port: otlp-http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otel-collector-config.yml
              subPath: otel-collector-config.yml
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
