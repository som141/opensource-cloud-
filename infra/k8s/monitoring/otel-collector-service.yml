apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: docprep-cloud
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
