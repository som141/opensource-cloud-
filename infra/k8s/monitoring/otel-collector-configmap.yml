apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: docprep-cloud
data:
  otel-collector-config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    exporters:
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
