apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: docprep-cloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: docprep-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: docprep-cloud
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: docprep-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: docprep-cloud
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: docprep-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: docprep-cloud
