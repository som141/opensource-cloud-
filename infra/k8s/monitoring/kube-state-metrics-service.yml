apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/part-of: docprep-cloud
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kube-state-metrics
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: telemetry
      port: 8081
      targetPort: telemetry
