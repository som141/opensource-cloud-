apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: docprep-cloud
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - prometheus:9090

      - job_name: backend-api
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - backend-api:8080

      - job_name: preprocess-worker
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - preprocess-worker:8081

      - job_name: rabbitmq
        metrics_path: /metrics
        static_configs:
          - targets:
              - rabbitmq:15692

      - job_name: kube-state-metrics
        metrics_path: /metrics
        static_configs:
          - targets:
              - kube-state-metrics:8080

      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - docprep-cloud
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: node-exporter
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_endpoint_node_name]
            target_label: instance
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      - job_name: keda-operator
        metrics_path: /metrics
        static_configs:
          - targets:
              - keda-operator.keda.svc.cluster.local:9666
