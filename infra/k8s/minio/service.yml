apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: docprep-cloud
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
