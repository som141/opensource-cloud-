apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: minio-bucket-init
    app.kubernetes.io/part-of: docprep-cloud
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-bucket-init
        app.kubernetes.io/part-of: docprep-cloud
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-04-16T18-13-26Z
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-api-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-api-secret
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              value: image-preprocess-prod
          command:
            - sh
            - -c
            - |
              set -eu
              until mc alias set local http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; do
                echo "waiting for minio"
                sleep 2
              done
              mc mb --ignore-existing "local/$MINIO_BUCKET"
              mc anonymous set none "local/$MINIO_BUCKET"
