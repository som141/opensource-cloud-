apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: docprep-cloud
  annotations:
    docprep-cloud.io/placeholder: "Replace with managed PostgreSQL, operator, or StatefulSet before production."
spec:
  type: ExternalName
  externalName: postgres.example.internal
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
