apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-api-config
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/part-of: docprep-cloud
data:
  DB_URL: jdbc:postgresql://postgres:5432/image_preprocess
  JPA_DDL_AUTO: validate
  SERVER_FORWARD_HEADERS_STRATEGY: framework
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  ACCESS_TOKEN_EXPIRE_SECONDS: "1800"
  REFRESH_TOKEN_EXPIRE_SECONDS: "1209600"
  REFRESH_TOKEN_COOKIE_NAME: refresh_token
  REFRESH_TOKEN_COOKIE_SECURE: "true"
  REFRESH_TOKEN_COOKIE_SAME_SITE: Lax
  OAUTH2_SUCCESS_REDIRECT_URI: https://YOUR_DOMAIN/oauth2/success
  CORS_ALLOWED_ORIGINS: https://YOUR_DOMAIN
  MINIO_ENDPOINT: http://minio:9000
  MINIO_PUBLIC_ENDPOINT: https://YOUR_DOMAIN
  MINIO_BUCKET: image-preprocess-prod
  MINIO_REGION: us-east-1
  RABBIT_HEALTH_ENABLED: "true"
  OTEL_TRACES_SAMPLER_PROBABILITY: "1.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
