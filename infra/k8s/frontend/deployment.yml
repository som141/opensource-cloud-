apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: docprep-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: docprep-cloud
    spec:
      containers:
        - name: frontend
          image: YOUR_REGISTRY/docprep-frontend:CHANGE_ME
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
