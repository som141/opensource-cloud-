apiVersion: apps/v1
kind: Deployment
metadata:
  name: preprocess-worker
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: preprocess-worker
    app.kubernetes.io/part-of: docprep-cloud
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: preprocess-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: preprocess-worker
        app.kubernetes.io/part-of: docprep-cloud
    spec:
      containers:
        - name: preprocess-worker
          image: YOUR_REGISTRY/docprep-preprocess-worker:CHANGE_ME
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: preprocess-worker-config
            - secretRef:
                name: preprocess-worker-secret
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms512m -Xmx3g -XX:+ExitOnOutOfMemoryError"
            - name: SPRING_RABBITMQ_LISTENER_SIMPLE_PREFETCH
              value: "1"
            - name: SPRING_RABBITMQ_LISTENER_SIMPLE_CONCURRENCY
              value: "1"
            - name: SPRING_RABBITMQ_LISTENER_SIMPLE_MAX_CONCURRENCY
              value: "1"
          ports:
            - name: management
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
