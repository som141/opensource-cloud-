apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: docprep-cloud
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: docprep-cloud
  annotations:
    docprep-cloud.io/placeholder: "Replace with managed RabbitMQ, operator, or StatefulSet before production."
spec:
  type: ExternalName
  externalName: rabbitmq.example.internal
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
